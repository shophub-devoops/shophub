name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    name: Build and push to DockerHub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            EXTRA_TAG="latest"
          else
            VERSION="0.0.0-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
            EXTRA_TAG="main"
          fi
          IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shophub-backend"
          {
            echo "version=${VERSION}"
            echo "extra_tag=${EXTRA_TAG}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:${EXTRA_TAG}"
          } >> $GITHUB_OUTPUT
          echo "Tagging as: ${IMAGE}:${VERSION} + ${IMAGE}:${EXTRA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=shophub-backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
