name: Lint Commit Messages
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: wagoid/commitlint-github-action@v6
  # Squash-merge uses the PR title as the commit subject on main, so the title
  # must follow Conventional Commits too — commitlint above only checks the
  # branch commits, which lets a non-conforming title slip through.
  pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
